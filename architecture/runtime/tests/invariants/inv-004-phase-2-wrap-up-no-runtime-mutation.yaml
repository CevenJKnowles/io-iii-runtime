schema: "io-iii-invariant-spec"
version: "v1.0"

id: "INV-004"
title: "Phase Boundary Guardrails (Config + History Immutable)"
status: "active"
source_of_truth:
  - "./docs/overview/DOC-OVW-003-io-iii-session-state-2026-03-04.md"
  - "./docs/runtime/DOC-RUN-002-sessionstate-v0-contract.md"

assertions:
  - name: "Runtime config must not be modified without explicit approval"
    type: "git_forbid_paths"
    scope: "both"
    forbidden_paths:
      - "architecture/runtime/config/"

  - name: "Archive/history layer must not be modified"
    type: "git_forbid_paths"
    scope: "both"
    forbidden_paths:
      - "history/"
