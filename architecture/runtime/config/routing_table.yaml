# FILE: architecture/runtime/config/routing_table.yaml
#
# ============================================================
# IO-III Routing Table — configuration guide
# ============================================================
#
# Each entry under `models:` and `modes:` maps a named mode to
# a specific Ollama model. The `name` value must exactly match
# a model that Ollama has pulled and can serve locally.
#
# Check what you have:
#   ollama list
#
# This constellation uses two Qwen3.5 model variants created via
# Ollama Modelfiles. See docs/user-guide/MODELS.md for setup.
#
#   qwen3.5:9b-think   — deep reasoning, challenger audit, exploration
#   qwen3.5:9b-nothink — executor, drafting, synthesis (fast path)
#   qwen3.5:4b         — lightweight transforms, gate evaluation, data
#
# To pull and create the variants:
#   ollama pull qwen3.5:9b
#   ollama pull qwen3.5:4b
#   ollama create qwen3.5:9b-think   -f architecture/runtime/config/modelfiles/qwen3.5-think.Modelfile
#   ollama create qwen3.5:9b-nothink -f architecture/runtime/config/modelfiles/qwen3.5-nothink.Modelfile
#
# If io_iii reports "Model not found", the name here does not
# match what Ollama has installed. Run `ollama list` to verify.
#
# Reference: ADR-002 (routing and fallback policy)
# ============================================================

routing_table:
  rules:
    selection_method: mode
    boundaries:
      challenger_user_facing: false
      single_voice_output: true

      data:
        allowed: [parse, extract, normalize, structure]
        forbidden: [interpret, infer, rewrite_intent, style]
      reasoning:
        allowed: [interpret, infer, reason, decide]
        forbidden: [style, format_for_delivery]
      challenger:
        allowed: [critique, detect_errors, propose_corrections]
        forbidden: [final_output_voice, style]
      draft:
        allowed: [format_for_delivery, clarity, tone, structure_output]
        forbidden: [new_reasoning, introduce_new_facts]
      fast:
        allowed: [lightweight_transform, quick_checks]
        forbidden: [deep_reasoning, reinterpret_intent]

  models:
    data:
      provider: ollama
      name: "qwen3.5:4b"
    reasoning:
      provider: ollama
      name: "qwen3.5:9b-think"
    challenger:
      provider: ollama
      name: "qwen3.5:9b-think"
    draft:
      provider: ollama
      name: "qwen3.5:4b"
    fast:
      provider: ollama
      name: "qwen3.5:4b"

  modes:
    executor:
      primary: "local:mistral:latest"
      secondary: "local:mistral:latest"

    explorer:
      primary: "local:qwen3.5:9b-think"
      secondary: "local:qwen3.5:4b"

    challenger:
      primary: "local:qwen3.5:9b-think"
      secondary: "local:qwen3.5:4b"

    synthesizer:
      primary: "local:mistral:latest"
      secondary: "local:mistral:latest"

    visionary:
      primary: "local:qwen3.5:9b-think"
      secondary: "local:qwen3.5:4b"

    fast:
      primary: "local:mistral:latest"
      secondary: "local:mistral:latest"

    draft:
      primary: "local:mistral:latest"
      secondary: "local:mistral:latest"

    data:
      primary: "local:mistral:latest"
      secondary: "local:mistral:latest"

    steward:
      primary: "local:mistral:latest"
      secondary: "local:mistral:latest"
