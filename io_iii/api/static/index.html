<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IO-III Runtime</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1rem;
      color: #58a6ff;
      letter-spacing: 0.05em;
    }

    #status-pill {
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 12px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
    }

    #status-pill.active   { background: #0f2a1a; border-color: #3fb950; color: #3fb950; }
    #status-pill.paused   { background: #2a1a0f; border-color: #d29922; color: #d29922; }
    #status-pill.closed   { background: #21262d; border-color: #6e7681; color: #6e7681; }
    #status-pill.at_limit { background: #21262d; border-color: #6e7681; color: #6e7681; }

    #session-meta {
      font-size: 0.72rem;
      color: #8b949e;
      margin-left: auto;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #controls {
      padding: 10px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 5px 14px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
    }

    button:hover { background: #30363d; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-start { border-color: #388bfd; color: #58a6ff; }
    #btn-start:hover { background: #1c2d4a; }
    #btn-close { border-color: #da3633; color: #f85149; }
    #btn-close:hover { background: #3d1717; }

    #mode-select {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 0.8rem;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 820px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1c2d4a;
      border: 1px solid #388bfd;
      color: #c9d1d9;
    }

    .msg.system {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      font-size: 0.78rem;
    }

    .msg.event {
      align-self: center;
      background: transparent;
      border: 1px dashed #30363d;
      color: #6e7681;
      font-size: 0.72rem;
      padding: 4px 12px;
    }

    .msg.error {
      align-self: flex-start;
      background: #3d1717;
      border: 1px solid #da3633;
      color: #f85149;
    }

    .msg.turn-meta {
      align-self: flex-start;
      background: #0f2a1a;
      border: 1px solid #3fb950;
      color: #3fb950;
      font-size: 0.75rem;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #388bfd;
      color: #c9d1d9;
      max-width: 820px;
    }

    #input-area {
      padding: 12px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 8px;
    }

    #prompt-input {
      flex: 1;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 0.85rem;
      resize: none;
      min-height: 38px;
      max-height: 120px;
    }

    #prompt-input:focus { outline: none; border-color: #388bfd; }

    #btn-send {
      padding: 8px 18px;
      background: #1f6feb;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }

    #btn-send:hover { background: #388bfd; }
    #btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    #pause-banner {
      display: none;
      padding: 10px 20px;
      background: #2a1a0f;
      border-top: 1px solid #d29922;
      color: #d29922;
      font-size: 0.8rem;
      gap: 8px;
      align-items: center;
    }

    #pause-banner.visible { display: flex; }

    #pause-banner button {
      border-color: #d29922;
      color: #d29922;
      font-size: 0.75rem;
    }

    #pause-banner button:hover { background: #3b2608; }
  </style>
</head>
<body>

<header>
  <h1>&#9632; IO-III Runtime</h1>
  <span id="status-pill">no session</span>
  <span id="session-meta"></span>
</header>

<main>
  <div id="controls">
    <select id="mode-select" title="Session mode">
      <option value="work">work</option>
      <option value="steward">steward</option>
    </select>
    <button id="btn-start">Start session</button>
    <button id="btn-close" disabled>Close session</button>
    <button id="btn-events" disabled title="Subscribe to SSE event stream">Stream events</button>
  </div>

  <div id="chat">
    <div class="msg system">IO-III Runtime API — self-hosted web UI (M9.5)
Responses shown when content_release: true in runtime.yaml (ADR-026).
Start a session to begin.</div>
  </div>

  <div id="pause-banner">
    &#9646;&#9646; Steward gate — session paused awaiting review.
    <button id="btn-approve">Approve &amp; continue</button>
    <button id="btn-redirect">Redirect</button>
    <button id="btn-close-from-pause">Close session</button>
  </div>

  <div id="input-area">
    <textarea id="prompt-input" placeholder="Enter prompt and press Send (or Ctrl+Enter)..." disabled rows="1"></textarea>
    <button id="btn-send" disabled>Send</button>
  </div>
</main>

<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  let sessionId = null;
  let sessionMode = 'work';
  let sessionStatus = null;
  let sse = null;
  let sending = false;

  // ---------------------------------------------------------------------------
  // DOM refs
  // ---------------------------------------------------------------------------
  const chat         = document.getElementById('chat');
  const pill         = document.getElementById('status-pill');
  const meta         = document.getElementById('session-meta');
  const modeSelect   = document.getElementById('mode-select');
  const btnStart     = document.getElementById('btn-start');
  const btnClose     = document.getElementById('btn-close');
  const btnEvents    = document.getElementById('btn-events');
  const promptInput  = document.getElementById('prompt-input');
  const btnSend      = document.getElementById('btn-send');
  const pauseBanner  = document.getElementById('pause-banner');
  const btnApprove   = document.getElementById('btn-approve');
  const btnRedirect  = document.getElementById('btn-redirect');
  const btnClosePause = document.getElementById('btn-close-from-pause');

  // ---------------------------------------------------------------------------
  // UI helpers
  // ---------------------------------------------------------------------------
  function addMsg(text, cls) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function setPill(status) {
    sessionStatus = status;
    pill.textContent = status || 'no session';
    pill.className = '';
    if (status) pill.classList.add(status.replace(/_/g, '-'));
  }

  function setMeta(turnCount, maxTurns) {
    if (turnCount == null) { meta.textContent = ''; return; }
    meta.textContent = 'turn ' + turnCount + ' / ' + maxTurns;
  }

  function setControls() {
    const hasSession = Boolean(sessionId);
    const active = hasSession && sessionStatus === 'active';
    const paused = hasSession && sessionStatus === 'paused';

    btnStart.disabled  = hasSession;
    btnClose.disabled  = !hasSession || sessionStatus === 'closed';
    btnEvents.disabled = !hasSession;
    promptInput.disabled = !active || sending;
    btnSend.disabled     = !active || sending;

    pauseBanner.classList.toggle('visible', paused);
  }

  // ---------------------------------------------------------------------------
  // API calls
  // ---------------------------------------------------------------------------
  async function apiPost(path, body) {
    const resp = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return resp.json();
  }

  async function apiGet(path) {
    const resp = await fetch(path);
    return resp.json();
  }

  async function apiDelete(path) {
    const resp = await fetch(path, { method: 'DELETE' });
    return resp.json();
  }

  // ---------------------------------------------------------------------------
  // Session start
  // ---------------------------------------------------------------------------
  btnStart.addEventListener('click', async () => {
    const mode = modeSelect.value;
    btnStart.disabled = true;
    addMsg('Starting ' + mode + ' session…', 'system');
    try {
      const result = await apiPost('/session/start', { mode });
      if (result.session_id) {
        sessionId   = result.session_id;
        sessionMode = mode;
        setPill(result.status || result.session_status || 'active');
        setMeta(result.turn_count, result.max_turns);
        addMsg(
          'Session started\n' +
          'ID:   ' + sessionId + '\n' +
          'mode: ' + mode + '\n' +
          'max turns: ' + (result.max_turns || '?'),
          'turn-meta'
        );
      } else {
        addMsg('Failed to start session: ' + JSON.stringify(result), 'error');
      }
    } catch (e) {
      addMsg('Error: ' + e.message, 'error');
    }
    setControls();
  });

  // ---------------------------------------------------------------------------
  // Send turn
  // ---------------------------------------------------------------------------
  async function sendTurn(prompt, action) {
    if (sending) return;
    sending = true;
    setControls();

    if (prompt) addMsg(prompt, 'user');

    const body = { persona_mode: 'executor' };
    if (prompt) body.prompt = prompt;
    if (action) body.action = action;

    try {
      const result = await apiPost('/session/' + sessionId + '/turn', body);
      const newStatus = result.session_status || result.status;
      setPill(newStatus);
      setMeta(result.turn_count, null);

      if (result.error_code) {
        addMsg('Turn error: ' + result.error_code, 'error');
      } else {
        // Display model response when content release gate is open (ADR-026).
        if (result.response) {
          addMsg(result.response, 'assistant');
        }
        const info = [
          'turn ' + result.turn_index + ' — ' + (result.status || '?'),
          'latency: ' + (result.latency_ms != null ? result.latency_ms + ' ms' : '?'),
          'session: ' + newStatus,
        ].join('  ·  ');
        addMsg(info, 'turn-meta');
      }
    } catch (e) {
      addMsg('Error: ' + e.message, 'error');
    }

    sending = false;
    setControls();
  }

  btnSend.addEventListener('click', () => {
    const text = promptInput.value.trim();
    if (!text) return;
    promptInput.value = '';
    sendTurn(text, null);
  });

  promptInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      btnSend.click();
    }
  });

  // ---------------------------------------------------------------------------
  // Close session
  // ---------------------------------------------------------------------------
  async function closeSession() {
    if (!sessionId) return;
    try {
      const result = await apiDelete('/session/' + sessionId);
      setPill(result.status || 'closed');
      addMsg('Session closed — turns: ' + (result.turn_count || '?'), 'system');
    } catch (e) {
      addMsg('Close error: ' + e.message, 'error');
    }
    if (sse) { sse.close(); sse = null; }
    sessionId = null;
    setControls();
    setMeta(null, null);
  }

  btnClose.addEventListener('click', closeSession);

  // ---------------------------------------------------------------------------
  // Steward pause actions
  // ---------------------------------------------------------------------------
  btnApprove.addEventListener('click', () => sendTurn(null, 'approve'));
  btnRedirect.addEventListener('click', () => {
    const p = promptInput.value.trim() || 'redirect';
    promptInput.value = '';
    sendTurn(p, 'redirect');
  });
  btnClosePause.addEventListener('click', closeSession);

  // ---------------------------------------------------------------------------
  // SSE event stream
  // ---------------------------------------------------------------------------
  btnEvents.addEventListener('click', () => {
    if (!sessionId) return;
    if (sse) { sse.close(); sse = null; btnEvents.textContent = 'Stream events'; return; }

    sse = new EventSource('/session/' + sessionId + '/stream');
    btnEvents.textContent = 'Stop stream';

    const eventTypes = [
      'session_state', 'turn_started', 'turn_completed',
      'steward_gate_triggered', 'session_closed', 'keepalive',
    ];

    eventTypes.forEach(type => {
      sse.addEventListener(type, (e) => {
        let data;
        try { data = JSON.parse(e.data); } catch { data = e.data; }

        if (type === 'keepalive') return; // silent

        if (type === 'session_state') {
          setPill(data.status);
        } else if (type === 'turn_completed') {
          setPill(data.session_status || sessionStatus);
        } else if (type === 'session_closed') {
          setPill(data.session_status || 'closed');
        } else if (type === 'steward_gate_triggered') {
          setPill('paused');
        }

        const label = {
          session_state:          '&#x25CE; session state',
          turn_started:           '&#x25BA; turn started',
          turn_completed:         '&#x25A0; turn completed',
          steward_gate_triggered: '&#x23F8; steward gate triggered',
          session_closed:         '&#x25A1; session closed',
        }[type] || type;

        const el = document.createElement('div');
        el.className = 'msg event';
        el.innerHTML = label + ' &mdash; ' + JSON.stringify(data);
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;

        setControls();
      });
    });

    sse.onerror = () => {
      addMsg('SSE stream error or closed.', 'system');
      sse.close(); sse = null;
      btnEvents.textContent = 'Stream events';
    };
  });

  // ---------------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------------
  setControls();
})();
</script>
</body>
</html>
