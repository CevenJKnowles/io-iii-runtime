<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IO-III Runtime</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 0.9rem;
      color: #58a6ff;
      letter-spacing: 0.04em;
      font-family: 'Courier New', monospace;
    }

    #status-pill {
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 12px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      font-family: 'Courier New', monospace;
    }
    #status-pill.active   { background: #0f2a1a; border-color: #3fb950; color: #3fb950; }
    #status-pill.paused   { background: #2a1a0f; border-color: #d29922; color: #d29922; }
    #status-pill.closed   { background: #21262d; border-color: #6e7681; color: #6e7681; }
    #status-pill.at_limit { background: #21262d; border-color: #6e7681; color: #6e7681; }

    #header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    select, button {
      font-family: inherit;
      font-size: 0.8rem;
    }

    #mode-select {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      padding: 4px 8px;
    }

    .btn {
      padding: 4px 14px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
    }
    .btn:hover { background: #30363d; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-danger { border-color: #da3633; color: #f85149; }
    .btn-danger:hover { background: #3d1717; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: #1c2128;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-bottom-left-radius: 4px;
    }

    .bubble.system {
      align-self: center;
      background: transparent;
      color: #6e7681;
      font-size: 0.75rem;
      text-align: center;
      max-width: 90%;
    }

    .bubble.error {
      align-self: flex-start;
      background: #3d1717;
      border: 1px solid #da3633;
      color: #f85149;
      font-size: 0.82rem;
    }

    .thinking {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 10px 14px;
    }
    .thinking span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #58a6ff;
      animation: pulse 1.2s infinite ease-in-out;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    #pause-banner {
      display: none;
      padding: 10px 20px;
      background: #2a1a0f;
      border-top: 1px solid #d29922;
      color: #d29922;
      font-size: 0.8rem;
      gap: 10px;
      align-items: center;
    }
    #pause-banner.visible { display: flex; }
    #pause-banner .btn { border-color: #d29922; color: #d29922; font-size: 0.75rem; }
    #pause-banner .btn:hover { background: #3b2608; }

    #file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px 0;
    }
    #file-row.hidden { display: none; }

    #file-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2px 10px;
      color: #8b949e;
    }
    #file-chip .dismiss {
      cursor: pointer;
      color: #6e7681;
      font-size: 0.9rem;
      line-height: 1;
    }
    #file-chip .dismiss:hover { color: #f85149; }

    .btn-attach {
      padding: 4px 10px;
      font-size: 0.8rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #8b949e;
      cursor: pointer;
    }
    .btn-attach:hover { background: #30363d; color: #c9d1d9; }
    .btn-attach:disabled { opacity: 0.35; cursor: not-allowed; }

    #input-area {
      padding: 12px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 8px;
    }

    #prompt-input {
      flex: 1;
      padding: 9px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 20px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 0.88rem;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
    }
    #prompt-input:focus { border-color: #388bfd; }

    #btn-send {
      padding: 8px 20px;
      background: #1f6feb;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #btn-send:hover { background: #388bfd; }
    #btn-send:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>&#9632; IO-III Runtime</h1>
  <span id="status-pill">no session</span>
  <div id="header-actions">
    <select id="mode-select" title="Session mode">
      <option value="work">work</option>
      <option value="steward">steward</option>
    </select>
    <button id="btn-start" class="btn">Start session</button>
    <button id="btn-close" class="btn btn-danger" disabled>Close session</button>
  </div>
</header>

<div id="chat">
  <div class="bubble system">Start a session to begin.</div>
</div>

<div id="pause-banner">
  &#9646;&#9646; Session paused — steward review required.
  <button id="btn-approve" class="btn">Approve</button>
  <button id="btn-redirect" class="btn">Redirect</button>
  <button id="btn-close-pause" class="btn btn-danger">Close</button>
</div>

<input type="file" id="file-picker" accept=".txt,.md,.csv,.json,.yaml,.py,.pdf,.docx" style="display:none" />
<div id="file-row" class="hidden">
  <button class="btn-attach" id="btn-attach" disabled>📎 Attach file</button>
  <span id="file-chip" style="display:none">
    <span id="file-chip-name"></span>
    <span class="dismiss" id="btn-dismiss-file" title="Remove file">×</span>
  </span>
</div>
<div id="input-area">
  <textarea id="prompt-input" placeholder="Message IO-III… (Enter to send)" disabled rows="1"></textarea>
  <button id="btn-send" disabled>Send</button>
</div>

<script>
(function () {
  'use strict';

  let sessionId = null;
  let sessionStatus = null;
  let sending = false;
  let attachedFileRef = null;
  let attachedFileName = null;

  const chat        = document.getElementById('chat');
  const pill        = document.getElementById('status-pill');
  const modeSelect  = document.getElementById('mode-select');
  const btnStart    = document.getElementById('btn-start');
  const btnClose    = document.getElementById('btn-close');
  const promptInput = document.getElementById('prompt-input');
  const btnSend     = document.getElementById('btn-send');
  const pauseBanner = document.getElementById('pause-banner');
  const btnApprove  = document.getElementById('btn-approve');
  const btnRedirect = document.getElementById('btn-redirect');
  const btnClosePause = document.getElementById('btn-close-pause');
  const filePicker      = document.getElementById('file-picker');
  const btnAttach       = document.getElementById('btn-attach');
  const fileRow         = document.getElementById('file-row');
  const fileChip        = document.getElementById('file-chip');
  const fileChipName    = document.getElementById('file-chip-name');
  const btnDismissFile  = document.getElementById('btn-dismiss-file');

  // ── helpers ──────────────────────────────────────────────────────────────

  function clearAttachment() {
    attachedFileRef = null;
    attachedFileName = null;
    filePicker.value = '';
    fileChip.style.display = 'none';
    fileChipName.textContent = '';
  }

  function bubble(text, cls) {
    const d = document.createElement('div');
    d.className = 'bubble ' + cls;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  function showThinking() {
    const d = document.createElement('div');
    d.className = 'thinking';
    d.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  function setPill(status) {
    sessionStatus = status;
    pill.textContent = status || 'no session';
    pill.className = '';
    if (status) pill.classList.add(status.replace(/_/g, '-'));
  }

  function setControls() {
    const has = Boolean(sessionId);
    const active = has && sessionStatus === 'active';
    const paused = has && sessionStatus === 'paused';
    btnStart.disabled        = has;
    btnClose.disabled        = !has || sessionStatus === 'closed';
    promptInput.disabled     = !active || sending;
    btnSend.disabled         = !active || sending;
    pauseBanner.classList.toggle('visible', paused);
    btnAttach.disabled = !has || sending;
    fileRow.classList.toggle('hidden', !has);
  }

  // ── API ───────────────────────────────────────────────────────────────────

  async function post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return r.json();
  }

  async function del(path) {
    const r = await fetch(path, { method: 'DELETE' });
    return r.json();
  }

  // ── session start ─────────────────────────────────────────────────────────

  btnStart.addEventListener('click', async () => {
    btnStart.disabled = true;
    const mode = modeSelect.value;
    try {
      const res = await post('/session/start', { mode });
      if (res.session_id) {
        sessionId = res.session_id;
        setPill(res.status || res.session_status || 'active');
        bubble('Session started · ' + mode + ' mode', 'system');
      } else {
        bubble('Failed to start: ' + (res.error_code || JSON.stringify(res)), 'error');
      }
    } catch (e) {
      bubble('Error: ' + e.message, 'error');
    }
    setControls();
  });

  // ── send turn ─────────────────────────────────────────────────────────────

  async function sendTurn(prompt, action) {
    if (sending) return;
    sending = true;
    setControls();

    if (prompt) bubble(prompt, 'user');

    const thinking = showThinking();

    const body = { persona_mode: 'executor' };
    if (prompt) body.prompt = prompt;
    if (action) body.action = action;
    if (attachedFileRef) body.file_ref = attachedFileRef;

    try {
      const res = await post('/session/' + sessionId + '/turn', body);
      thinking.remove();

      const newStatus = res.session_status || res.status;
      setPill(newStatus);

      clearAttachment();

      if (res.error_code === 'FILE_REF_EXPIRED') {
        bubble('File expired — server was restarted. Please re-upload the file.', 'error');
        clearAttachment();
      } else if (res.error_code) {
        bubble('Error: ' + res.error_code, 'error');
      } else if (res.response) {
        bubble(res.response, 'assistant');
      }
      // No response field = content_release disabled; show nothing.

    } catch (e) {
      thinking.remove();
      bubble('Error: ' + e.message, 'error');
    }

    sending = false;
    setControls();
  }

  btnSend.addEventListener('click', () => {
    const text = promptInput.value.trim();
    if (!text) return;
    promptInput.value = '';
    sendTurn(text, null);
  });

  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      btnSend.click();
    }
  });

  // auto-grow textarea
  promptInput.addEventListener('input', () => {
    promptInput.style.height = 'auto';
    promptInput.style.height = Math.min(promptInput.scrollHeight, 120) + 'px';
  });

  // ── close session ─────────────────────────────────────────────────────────

  async function closeSession() {
    if (!sessionId) return;
    try {
      const res = await del('/session/' + sessionId);
      setPill(res.status || 'closed');
      bubble('Session closed.', 'system');
    } catch (e) {
      bubble('Close error: ' + e.message, 'error');
    }
    sessionId = null;
    setControls();
  }

  btnClose.addEventListener('click', closeSession);

  // ── steward pause ─────────────────────────────────────────────────────────

  btnApprove.addEventListener('click', () => sendTurn(null, 'approve'));
  btnRedirect.addEventListener('click', () => {
    const p = promptInput.value.trim() || 'redirect';
    promptInput.value = '';
    sendTurn(p, 'redirect');
  });
  btnClosePause.addEventListener('click', closeSession);

  // ── file attachment ───────────────────────────────────────────────────────

  btnAttach.addEventListener('click', () => filePicker.click());

  filePicker.addEventListener('change', async () => {
    const f = filePicker.files[0];
    if (!f || !sessionId) return;

    const MAX = 2 * 1024 * 1024;
    if (f.size > MAX) {
      bubble('File too large (2 MB limit).', 'error');
      filePicker.value = '';
      return;
    }

    const formData = new FormData();
    formData.append('file', f);
    formData.append('session_id', sessionId);

    try {
      const r = await fetch('/upload', { method: 'POST', body: formData });
      const res = await r.json();
      if (res.error) {
        bubble('Upload failed: ' + res.error.message, 'error');
        filePicker.value = '';
        return;
      }
      attachedFileRef = res.file_ref;
      attachedFileName = res.filename;
      fileChipName.textContent = res.filename + ' (' + res.chars.toLocaleString() + ' chars)';
      fileChip.style.display = 'inline-flex';
    } catch (e) {
      bubble('Upload error: ' + e.message, 'error');
      filePicker.value = '';
    }
  });

  btnDismissFile.addEventListener('click', clearAttachment);

  // ── init ──────────────────────────────────────────────────────────────────
  setControls();
})();
</script>
</body>
</html>
